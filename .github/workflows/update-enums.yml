name: Update generated enums

on:
  schedule:
    - cron: "0 7 * * 1"  # Every Monday at 07:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  update-enums:
    name: Regenerate enums from NCBI OpenAPI spec
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Regenerate enums
        run: python scripts/gen_enums.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/ncbi_datasets_mcp/domains/_generated_enums.py; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR if enums changed
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/update-enums-$(date +%Y-%m-%d)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/ncbi_datasets_mcp/domains/_generated_enums.py
          git commit -m "chore: regenerate enums from NCBI OpenAPI spec $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update generated enums from NCBI OpenAPI spec" \
            --body "$(cat <<'EOF'
          The NCBI Datasets OpenAPI spec has changed since the last enum generation.

          This PR was opened automatically by the weekly enum-sync workflow.
          Please review the diff in \`src/ncbi_datasets_mcp/domains/_generated_enums.py\`
          to confirm the changes look correct before merging.

          If new enum values were added, consider whether any MCP tool parameters
          or docstrings need updating to document them.
          EOF
          )" \
            --base main \
            --head "$BRANCH"
